name: Static analysis

on:
  pull_request:
  schedule:
    - cron: "15 2 * * *"

concurrency:
  group: psalm-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      src: ${{ steps.changes.outputs.src }}
    steps:
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        id: changes
        continue-on-error: true
        with:
          filters: |
            src:
              - '.github/workflows/**'
              - 'lib/**'
              - 'vendor/**'
              - 'vendor-bin/**'
              - 'composer.json'
              - 'composer.lock'
              - 'psalm.xml'
              - '**.php'

  setup:
    runs-on: ubuntu-latest
    outputs:
      php-min: ${{ steps.php-version.outputs.version }}
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

      - name: Get minimum PHP version from composer.json
        id: php-version
        run: echo "version=$(jq -r '.config.platform.php' composer.json)" >> $GITHUB_OUTPUT

  static-analysis:
    runs-on: ubuntu-latest

    needs: [changes, setup]
    if: needs.changes.outputs.src != 'false'

    strategy:
      fail-fast: false
      matrix:
        php-versions: ['8.2', '8.3']
        include:
          - php-versions: ${{ needs.setup.outputs.php-min }}

    name: PHP ${{ matrix.php-versions }}

    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

      - name: Set up php ${{ matrix.php-versions }}
        uses: shivammathur/setup-php@c541c155eee45413f5b09a52248675b1a2575231 #v2.31.1
        with:
          php-version: ${{ matrix.php-versions }}
          extensions: curl, json, mbstring
          coverage: none
          ini-file: development
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: composer i

      - name: Run static analysis
        run: composer run psalm -- --monochrome --no-progress --output-format=github

  summary:
    permissions:
      contents: none
    runs-on: ubuntu-latest
    needs: [changes, static-analysis]

    if: always()

    name: static-psalm-analysis-summary

    steps:
      - name: Summary status
        run: if ${{ needs.changes.outputs.src != 'false' && needs.static-analysis.result != 'success' }}; then exit 1; fi
